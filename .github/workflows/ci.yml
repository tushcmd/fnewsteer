name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint-and-test:
        name: Lint & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v4
              with:
                  enable-cache: true

            - name: Install dependencies
              run: uv sync

            - name: Lint (ruff)
              run: uv run ruff check packages/

            - name: Type check (pyright)
              run: uv run pyright packages/
              continue-on-error: true # informational until you add full type coverage

            - name: Test
              run: uv run pytest --tb=short
              env:
                  FNEWSTEER_API_KEY: ci-test-key

    docker-build:
        name: Docker Build Check
        runs-on: ubuntu-latest
        needs: lint-and-test

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build API image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: packages/api/Dockerfile
                  push: false # build only, no push on CI
                  tags: fnewsteer-api:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build MCP image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: packages/mcp/Dockerfile
                  push: false
                  tags: fnewsteer-mcp:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
