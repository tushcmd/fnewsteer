[project]
name = "fnewsteer-mcp"
version = "0.1.0"
description = "FNEWSTEER MCP server — news loss-prevention tools for AI agents"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.2.0,<2.0.0",
    "fnewsteer-api",
]

[tool.uv.sources]
fnewsteer-api = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fnewsteer_mcp"]