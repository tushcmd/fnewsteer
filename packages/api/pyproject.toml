[project]
name = "fnewsteer-api"
version = "0.1.0"
description = "Fundamental Analysis (News) Steer — loss-prevention API for price action traders"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "fastapi[standard]>=0.128.8",
    "python-dotenv>=1.2.1",
    "uvicorn[standard]>=0.40.0",
    "tzdata>=2024.1",  # required for zoneinfo on platforms without system tzdata (e.g. Windows)
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]